<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6C3CE1">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="عالم الحاسب">
<title>🌟 عالم الحاسب للأطفال V4</title>
<style>
:root{--bg:#0D0B2A;--purple:#6C3CE1;--purpleL:#C8B4FF;--pink:#E8368F;--pinkL:#FFB8DC;--orange:#FF7043;--teal:#00BFA5;--tealL:#80DFD4;--blue:#1E88E5;--blueL:#BBDEFB;--green:#43A047;--greenL:#C8E6C9;--yellow:#FFB300;--yellowL:#FFE082;--white:#FFF;--dark:#13112E;--card:#1E1C42;--gray:#607D8B;--red:#E53935}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:var(--white);user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
.topbar{background:var(--dark);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;min-height:52px;flex-shrink:0;border-bottom:2px solid var(--purple);gap:8px}
.topbar-title{font-size:14px;color:var(--purpleL);font-weight:700;flex:1;text-align:center;line-height:1.3}
.score-pill{background:var(--purple);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;color:var(--yellow);white-space:nowrap}
.back-btn{background:var(--card);border:1px solid var(--gray);color:var(--white);padding:6px 11px;border-radius:9px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.screen.active{display:block}
.pad{padding:13px}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:14px 11px;border:none;border-radius:15px;font-size:16px;font-weight:700;color:var(--white);cursor:pointer;margin-bottom:10px;box-shadow:0 4px 12px rgba(0,0,0,.35);transition:transform .1s,filter .1s;font-family:inherit;line-height:1.3;text-align:center}
.btn:active{transform:scale(.95);filter:brightness(.85)}
.btn.sm{padding:9px 12px;font-size:14px;border-radius:11px;margin-bottom:7px}
.btn.xs{padding:6px 10px;font-size:12px;border-radius:9px;margin-bottom:5px}
.purple{background:var(--purple)}.pink{background:var(--pink)}.teal{background:var(--teal);color:#000}.yellow{background:var(--yellow);color:#000}.green{background:var(--green)}.orange{background:var(--orange)}.blue{background:var(--blue)}.gray{background:var(--gray)}.red{background:var(--red)}
.card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.card h3{font-size:15px;margin-bottom:8px;font-weight:700}
.card p{font-size:13px;line-height:1.8;color:#ddd}
.home-hero{text-align:center;padding:16px 14px 10px}
.home-hero .star{font-size:48px}
.home-hero h1{font-size:22px;color:var(--yellow);margin:7px 0 3px;font-weight:900}
.home-hero p{font-size:12px;color:var(--purpleL)}
.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:11px 0}
.stat-box{background:var(--card);border-radius:11px;padding:9px 3px;text-align:center}
.stat-box .sn{font-size:20px;font-weight:900;color:var(--yellow)}
.stat-box .sl{font-size:9px;color:var(--gray);margin-top:1px}
.lesson-item{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.25);border-right:4px solid var(--purple);transition:transform .1s}
.lesson-item:active{transform:scale(.97)}
.li-icon{font-size:28px;flex-shrink:0}
.li-title{font-size:14px;font-weight:700;margin-bottom:2px}
.li-sub{font-size:11px;color:var(--gray)}
.li-slides{font-size:10px;color:var(--teal);margin-top:1px;font-weight:700}
.slide-wrap{padding:12px}
.slide-emoji{font-size:54px;text-align:center;padding:8px 0;display:block}
.slide-head{font-size:18px;font-weight:700;color:var(--yellowL);text-align:center;margin-bottom:12px;line-height:1.4}
.slide-body{font-size:13px;line-height:1.9;color:#eee;margin-bottom:10px}
.slide-body ul{padding-right:13px;list-style:none}
.slide-body ul li::before{content:"← ";color:var(--teal)}
.slide-body li{margin-bottom:4px}
.info-box{border-radius:12px;padding:10px 12px;margin-bottom:9px;font-size:12px;line-height:1.7}
.info-box.yellow{background:rgba(255,179,0,.18);border-right:3px solid var(--yellow);color:var(--yellowL)}
.info-box.blue{background:rgba(30,136,229,.18);border-right:3px solid var(--blue);color:var(--blueL)}
.info-box.teal{background:rgba(0,191,165,.18);border-right:3px solid var(--teal);color:var(--tealL)}
.info-box.orange{background:rgba(255,112,67,.18);border-right:3px solid var(--orange);color:#FFD0C0}
.info-box.purple{background:rgba(108,60,225,.18);border-right:3px solid var(--purple);color:var(--purpleL)}
.info-box.green{background:rgba(67,160,71,.18);border-right:3px solid var(--green);color:var(--greenL)}
.info-box.pink{background:rgba(232,54,143,.18);border-right:3px solid var(--pink);color:var(--pinkL)}
.info-box.red{background:rgba(229,57,53,.18);border-right:3px solid var(--red);color:#FFCDD2}
.fact-box{background:var(--purple);border-radius:12px;padding:10px 12px;font-size:12px;color:var(--yellowL);margin-bottom:12px;line-height:1.6}
.example-box{background:var(--dark);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#aaa;border-right:3px solid var(--teal);line-height:1.7}
.example-box strong{color:var(--tealL)}
.step-list{margin-bottom:10px}
.step-row{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;background:var(--card);border-radius:10px;padding:9px}
.step-num{background:var(--purple);color:var(--white);border-radius:50%;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-text{font-size:12px;line-height:1.7;color:#ddd}
.step-text strong{color:var(--yellowL)}
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.word-card{background:var(--card);border-radius:10px;padding:8px;text-align:center}
.word-en{font-size:12px;font-weight:700;color:var(--tealL);margin-bottom:2px}
.word-ar{font-size:11px;color:#ccc}
.dots{display:flex;justify-content:center;gap:5px;padding:8px 0;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gray);transition:.2s;flex-shrink:0}
.dot.active{background:var(--purple);transform:scale(1.5)}
.nav-row{display:flex;gap:7px;margin-top:8px}
.nav-row .btn{margin-bottom:0}
.progress-bar{height:5px;background:var(--gray);border-radius:3px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .4s}
.quiz-unit{font-size:36px;text-align:center;padding:6px 0}
.quiz-q-text{font-size:15px;font-weight:700;text-align:center;line-height:1.6;color:var(--white);padding:12px;background:var(--card);border-radius:14px;margin-bottom:12px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.opt{padding:12px 7px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;box-shadow:0 3px 8px rgba(0,0,0,.25);line-height:1.4;color:#fff}
.opt:active{transform:scale(.94)}
.opt.A{background:#1565C0}.opt.B{background:#00695C}.opt.C{background:#E65100}.opt.D{background:#4A148C}
.opt.correct{background:var(--green)!important}.opt.wrong{background:var(--red)!important}.opt.dim{opacity:.4}
.feedback{text-align:center;font-size:16px;font-weight:700;padding:6px;min-height:36px}
.feedback.ok{color:var(--green)}.feedback.err{color:var(--red)}
.feedback-detail{font-size:11px;color:#aaa;text-align:center;padding:4px;min-height:20px}
.mem-stats{display:flex;justify-content:space-between;padding:6px 2px;font-size:13px;color:var(--yellowL);font-weight:700;margin-bottom:8px}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.mem-card{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;background:var(--card);border:2px solid var(--gray);transition:.15s;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.mem-card:active{transform:scale(.9)}
.mem-card.flipped{background:var(--purple);border-color:var(--purple)}
.mem-card.matched{background:var(--green);border-color:var(--green)}
.timer-bar{height:7px;background:var(--gray);border-radius:4px;margin-bottom:10px;overflow:hidden}
.timer-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .1s linear}
.timer-fill.warn{background:var(--orange)}.timer-fill.danger{background:var(--red)}
.fq-q{font-size:16px;font-weight:700;text-align:center;padding:12px;background:var(--card);border-radius:14px;margin-bottom:12px;line-height:1.5}
.fq-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fq-opt{padding:13px 7px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;transition:.15s}
.fq-opt:active{transform:scale(.94)}
.fq-opt.correct{background:var(--green)!important}.fq-opt.wrong{background:var(--red)!important}.fq-opt.dim{opacity:.4}
/* Word Scramble Game */
.scramble-word{font-size:44px;font-weight:900;text-align:center;letter-spacing:8px;color:var(--yellowL);padding:16px;background:var(--card);border-radius:16px;margin-bottom:14px}
.scramble-hint{text-align:center;font-size:15px;color:var(--purpleL);margin-bottom:14px}
.letter-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.letter-btn{width:44px;height:44px;border:none;border-radius:10px;background:var(--purple);color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.letter-btn:active{transform:scale(.88)}
.letter-btn.used{opacity:.25;pointer-events:none}
.answer-slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;min-height:52px}
.slot{width:44px;height:44px;border:2px dashed var(--gray);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--white);cursor:pointer;transition:.15s}
.slot.filled{border-color:var(--teal);background:rgba(0,191,165,.2)}
/* True/False Game */
.tf-question{font-size:17px;font-weight:700;text-align:center;padding:18px;background:var(--card);border-radius:16px;margin-bottom:16px;line-height:1.6;color:var(--white)}
.tf-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.tf-btn{padding:20px;border:none;border-radius:16px;font-size:22px;font-weight:900;cursor:pointer;font-family:inherit;transition:.15s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tf-btn:active{transform:scale(.93)}
.tf-true{background:var(--green);color:#fff}
.tf-false{background:var(--red);color:#fff}
.tf-btn.correct{transform:scale(1.08);box-shadow:0 0 20px rgba(67,160,71,.6)}
.tf-btn.wrong{opacity:.4}
/* Stars */
.big-score{text-align:center;padding:16px;background:var(--card);border-radius:18px;margin-bottom:12px}
.big-score .snum{font-size:52px;font-weight:900;color:var(--yellow)}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.badge-card{border-radius:13px;padding:11px;text-align:center;opacity:.3;transition:.3s}
.badge-card.earned{opacity:1}
.badge-card .bi{font-size:28px}.badge-card .bn{font-size:11px;font-weight:700;margin-top:4px}
.badge-card .br{font-size:9px;color:rgba(255,255,255,.6);margin-top:2px}
.result{text-align:center;padding:24px 13px}
.result .big{font-size:60px}
.result h2{font-size:22px;color:var(--yellow);margin:10px 0 6px}
.result p{font-size:14px;color:#ccc;margin-bottom:16px;line-height:1.7}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .28s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .28s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.bounce{animation:bounce .4s ease}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="back-btn" id="back-btn" style="display:none" onclick="goBack()">🏠</button>
    <div class="topbar-title" id="screen-title">🌟 عالم الحاسب</div>
    <div class="score-pill">⭐ <span id="score-val">0</span></div>
  </div>
  <div id="home"     class="screen active"></div>
  <div id="lessons"  class="screen"></div>
  <div id="slide"    class="screen"></div>
  <div id="quiz"     class="screen"></div>
  <div id="games"    class="screen"></div>
  <div id="memory"   class="screen"></div>
  <div id="fastquiz" class="screen"></div>
  <div id="scramble" class="screen"></div>
  <div id="truefalse" class="screen"></div>
  <div id="stars"    class="screen"></div>
</div>
<script>
const LESSONS = [

// ══════════════════════════════════════════
// وحدة ١: الحاسب — ١٥ شريحة
// ══════════════════════════════════════════
{icon:'💻', title:'الحاسب والتقنية', color:'#1E88E5', slides:[
{emoji:'💻',head:'ما هو الحاسب؟ — التعريف الكامل',
 body:`<p>الحاسب آلة إلكترونية ذكية تستطيع استقبال المعلومات ومعالجتها وإخراج النتائج بسرعة خارقة. الكلمة من "حسب" أي حساب لأن أول وظيفته كانت الحساب الرياضي السريع.</p>`,
 info:[{t:'blue',x:'💡 الحاسب لا يفكر كالإنسان — هو ينفذ تعليماتك بدقة مطلقة لا يتعب ولا ينسى'},{t:'teal',x:'🔢 الحاسب يفهم لغة واحدة فقط: الأصفار والآحاد (0 و1) تُسمى النظام الثنائي Binary'},{t:'purple',x:'⚡ معالج حديث ينفذ ٥ مليار عملية كل ثانية — أسرع من أي عقل بشري بملايين المرات'}],
 example:'اضغط حرف "أ" ← إشارة كهربائية ← المعالج يُعالجها ← الشاشة تعرض الحرف. كل هذا في جزء من المليون من الثانية!',
 fact:'كلمة Computer الإنجليزية كانت تعني شخصاً يقوم بالحساب قبل أن تنتقل للآلة!',
 words:[{en:'Computer',ar:'حاسب'},{en:'Calculate',ar:'يحسب'},{en:'Electronic',ar:'إلكتروني'},{en:'Digital',ar:'رقمي'},{en:'Binary',ar:'ثنائي'},{en:'Data',ar:'بيانات'},{en:'Smart',ar:'ذكي'},{en:'Machine',ar:'آلة'}]},

{emoji:'📜',head:'تاريخ الحاسب — من الأبجدية للذكاء الاصطناعي',
 body:`<p>الحاسب لم يُولد كاملاً — تطور عبر عقود من الاختراعات والأفكار المتراكمة:</p>`,
 info:[{t:'blue',x:'١٨٤٢م — Ada Lovelace تكتب أول خوارزمية في التاريخ، قبل وجود الحاسب!'},{t:'teal',x:'١٩٤٥م — ENIAC أول حاسب إلكتروني. وزنه ٣٠ طناً وحجمه ١٦٧ متراً مربعاً!'},{t:'orange',x:'١٩٧٥م — Bill Gates و Paul Allen يؤسسان Microsoft في مرآب سيارات'},{t:'purple',x:'١٩٨٤م — Apple تُطلق Mac أول حاسب شخصي بواجهة رسومية للعامة'},{t:'green',x:'١٩٩١م — Tim Berners-Lee يخترع الويب World Wide Web ويُغير العالم'},{t:'yellow',x:'٢٠٢٣م — الذكاء الاصطناعي ChatGPT يُحدث ثورة في التفاعل مع الحاسب'}],
 fact:'Ada Lovelace ابنة الشاعر Byron كانت أول مبرمجة في التاريخ قبل ١٨٠ سنة!',
 words:[{en:'History',ar:'التاريخ'},{en:'Invention',ar:'اختراع'},{en:'Pioneer',ar:'رائد'},{en:'Revolution',ar:'ثورة'},{en:'Generation',ar:'جيل'},{en:'Innovation',ar:'ابتكار'},{en:'Evolution',ar:'تطور'},{en:'Milestone',ar:'محطة مهمة'}]},

{emoji:'🖥️',head:'الشاشة — نافذتك على العالم الرقمي',
 body:`<p>الشاشة هي أهم وسيلة إخراج في الحاسب. كل ما تفعله يظهر عليها. دعنا نتعرف عليها بعمق:</p>`,
 info:[{t:'blue',x:'📐 الدقة Resolution — عدد النقاط على الشاشة. 1920×1080 = Full HD. كلما زادت كانت الصورة أوضح'},{t:'teal',x:'📏 الحجم — يُقاس قطرياً بالبوصة. 24 إنش للمكتب • 15 إنش للابتوب • 6 إنش للهاتف'},{t:'orange',x:'🔄 معدل التحديث Hz — كم مرة تتجدد الصورة في الثانية. 60Hz عادي • 144Hz للألعاب'},{t:'purple',x:'🌈 نوع الشاشة — IPS ألوان رائعة • OLED أسود عميق • TN سريعة رخيصة'},{t:'green',x:'🔆 السطوع والتباين — اضبطهما لراحة عينيك. عينك ستشكرك بعد ساعات العمل'}],
 steps:[{n:'نصيحة',text:'المسافة المثالية بينك وبين الشاشة = ذراع ممدودة (50-70 سم). وأعلاها في مستوى عينيك'}],
 fact:'الشاشات OLED في هاتفك تُنتج الضوء من كل بكسل منفرداً — لهذا الأسود عميق جداً!',
 words:[{en:'Resolution',ar:'الدقة'},{en:'Screen',ar:'الشاشة'},{en:'Pixel',ar:'البكسل'},{en:'Brightness',ar:'السطوع'},{en:'Contrast',ar:'التباين'},{en:'Refresh Rate',ar:'معدل التحديث'},{en:'OLED',ar:'أوليد'},{en:'Monitor',ar:'الشاشة'}]},

{emoji:'⌨️',head:'لوحة المفاتيح — تشريح كامل',
 body:`<p>لوحة المفاتيح أعمق مما تتخيل! دعنا نتعرف على كل قسم فيها:</p>`,
 info:[{t:'blue',x:'🔢 صف الأرقام — الصف الأعلى. الأرقام 1-0 والرموز الخاصة مثل ! @ # $ %'},{t:'teal',x:'📝 الصف الأوسط ASDF — الصف الرئيسي للكتابة. ضع أصابعك هنا دائماً'},{t:'orange',x:'⌨️ مفاتيح Function F1-F12 — مفاتيح خاصة. F5 تحديث • F11 شاشة كاملة • F12 أدوات المطور'},{t:'purple',x:'🔢 لوحة الأرقام Numpad — يمين اللوحة. للمحاسبين والمبرمجين. NumLock يفعّلها'},{t:'green',x:'🧭 مفاتيح التنقل — الأسهم والـ Home وEnd وPage Up وPage Down للتنقل في النصوص'}],
 fact:'أسرع لوحة مفاتيح في العالم تُسمى Das Keyboard تصنع لاستخدامات المحترفين فقط!',
 words:[{en:'Keyboard',ar:'لوحة المفاتيح'},{en:'Function Key',ar:'مفتاح وظيفي'},{en:'Numpad',ar:'لوحة الأرقام'},{en:'Arrow Key',ar:'مفتاح السهم'},{en:'Modifier',ar:'مفتاح التعديل'},{en:'Layout',ar:'التخطيط'},{en:'Mechanical',ar:'ميكانيكي'},{en:'Wireless',ar:'لاسلكي'}]},

{emoji:'🖱️',head:'الفأرة — التحكم الدقيق',
 body:`<p>الفأرة تُترجم حركات يدك إلى حركات السهم على الشاشة. تعلّم استخدامها باحتراف:</p>`,

{emoji:'🧠',head:'المعالج CPU — دماغ الحاسب',
 body:`<p>المعالج هو أهم قطعة في الحاسب. كل أمر تعطيه يمر عبره. دعنا نفهمه بعمق:</p>`,
 info:[{t:'blue',x:'⚡ السرعة GHz — جيجاهرتز. 1 GHz = مليار دورة في الثانية. المعالجات الحديثة 3-5 GHz'},{t:'teal',x:'🔢 الأنوية Cores — كل نواة تُعالج مهمة مستقلة. 4 أنوية = 4 مهام في نفس الوقت'},{t:'orange',x:'🏢 شركات المعالجات — Intel (Core i3, i5, i7, i9) و AMD (Ryzen 3, 5, 7, 9)'},{t:'purple',x:'📱 معالج الهاتف — Apple M2 و Snapdragon 8 و Exynos. أصغر لكن أكثر كفاءة'},{t:'green',x:'🌡️ الحرارة — المعالج يُولّد حرارة. يحتاج مروحة أو مُبرد مائي Liquid Cooler'}],
 example:'تخيّل المعالج كمطعم. الأنوية Cores هي عدد الطهاة. كل طاهٍ يطبخ وجبة مستقلة في نفس الوقت!',
 fact:'معالج M2 من Apple يحتوي 20 مليار ترانزستور في رقاقة أصغر من ظفرك!',
 words:[{en:'CPU',ar:'المعالج'},{en:'Core',ar:'النواة'},{en:'GHz',ar:'جيجاهرتز'},{en:'Cache',ar:'الذاكرة المؤقتة'},{en:'Processor',ar:'المعالج'},{en:'Intel',ar:'إنتل'},{en:'AMD',ar:'أي إم دي'},{en:'Performance',ar:'الأداء'}]},

{emoji:'💾',head:'الذاكرة RAM — مكتب العمل',
 body:`<p>RAM هي الذاكرة العشوائية — المكان الذي يُخزّن الحاسب فيه البيانات أثناء العمل مؤقتاً:</p>`,
 info:[{t:'blue',x:'📋 مؤقتة — عند إيقاف الحاسب تُمسح RAM تلقائياً. لهذا تحفظ عملك قبل الإيقاف!'},{t:'teal',x:'⚡ سريعة جداً — أسرع بـ ١٠٠٠ مرة من القرص الصلب. لهذا تحفظ البرامج النشطة فيها'},{t:'orange',x:'📏 الحجم — 4GB الحد الأدنى • 8GB مناسب لمعظم الاستخدامات • 16GB+ للألعاب والبرمجة'},{t:'purple',x:'🔄 كثرة البرامج — فتح برامج كثيرة يملأ RAM ويُبطئ الحاسب. أغلق ما لا تحتاجه'},{t:'green',x:'📊 Task Manager — اضغط Ctrl+Shift+Esc لرؤية استهلاك RAM. أي برنامج يأكل أكثر؟'}],
 fact:'اسم RAM اختصار لـ Random Access Memory — تستطيع الوصول لأي خلية فيها في نفس الوقت!',
 words:[{en:'RAM',ar:'ذاكرة العمل'},{en:'Memory',ar:'الذاكرة'},{en:'Gigabyte',ar:'جيجابايت'},{en:'Temporary',ar:'مؤقت'},{en:'Speed',ar:'السرعة'},{en:'Capacity',ar:'السعة'},{en:'Upgrade',ar:'ترقية'},{en:'Slot',ar:'منفذ'}]},

{emoji:'💿',head:'التخزين — أين تعيش ملفاتك؟',
 body:`<p>التخزين يحفظ بياناتك دائماً حتى بعد إيقاف الحاسب. أنواع مختلفة لاستخدامات مختلفة:</p>`,
 info:[{t:'blue',x:'🔵 HDD القرص الصلب المغناطيسي — رخيص لكن بطيء. تسمع دوراناً عند العمل. 1TB = ~500 ريال'},{t:'teal',x:'⚡ SSD القرص الإلكتروني — سريع جداً وصامت. يُقلّص وقت تشغيل الحاسب من دقيقة لـ ١٠ ثوانٍ!'},{t:'orange',x:'☁️ السحابة Cloud — تخزين على الإنترنت. OneDrive وGoogle Drive وiCloud. آمن وتصل له من أي مكان'},{t:'purple',x:'🔌 USB Flash — وحدة تخزين محمولة. اختر USB 3.0 (أزرق) أسرع بـ ١٠ أضعاف من USB 2.0'},{t:'green',x:'💳 MicroSD — بطاقة صغيرة للهاتف والكاميرا. حتى 1TB في حجم ظفرك!'}],
 fact:'أكبر SSD في العالم سعته 100 TB = يمكنه حفظ 20,000 فيلم كامل!',
 words:[{en:'Storage',ar:'التخزين'},{en:'HDD',ar:'قرص صلب مغناطيسي'},{en:'SSD',ar:'قرص إلكتروني'},{en:'Terabyte',ar:'تيرابايت'},{en:'Flash',ar:'فلاش'},{en:'Cloud',ar:'السحابة'},{en:'Backup',ar:'نسخ احتياطي'},{en:'Portable',ar:'محمول'}]},

{emoji:'📡',head:'المحيطات Peripherals — ملحقات الحاسب',

{emoji:'📱',head:'الحواسيب المحمولة — مقارنة شاملة',

{emoji:'🔌',head:'التوصيلات والمنافذ — دليل كامل',
 body:`<p>الحاسب يحتوي منافذ متعددة لتوصيل الأجهزة المختلفة. تعرّف عليها:</p>`,
 info:[{t:'blue',x:'🔵 USB-A — المنفذ المستطيل الكلاسيكي. USB 2.0 (أسود) بطيء • USB 3.0 (أزرق) سريع'},{t:'teal',x:'🔵 USB-C — المنفذ البيضاوي الحديث. يعمل من أي اتجاه! للشحن ونقل البيانات والفيديو'},{t:'orange',x:'⚡ Thunderbolt — أسرع منفذ. يُستخدم في Mac. سرعة 40 Gbps = ينقل فيلم في ثانية!'},{t:'purple',x:'🖥️ HDMI وDisplayPort — لتوصيل الشاشات. 4K وحتى 8K. HDMI في التلفاز والشاشات'},{t:'green',x:'🎧 منفذ الصوت 3.5mm — للسماعات والميكروفون. بعض الهواتف أزالته!'},{t:'yellow',x:'💻 SD Card Reader — لبطاقات الكاميرا والهواتف. مدمج في بعض اللابتوبات'}],

{emoji:'⚡',head:'أداء الحاسب — كيف تُسرّعه؟',

 info:[{t:'red',x:'🐌 أسباب البطء: كثرة البرامج النشطة • RAM ممتلئة • قرص HDD قديم • فيروسات • تحديثات متراكمة'},{t:'blue',x:'🔄 الحل الأول — أعِد التشغيل. يُنظّف RAM ويُحل ٩٠٪ من المشاكل المؤقتة'},{t:'teal',x:'🧹 Disk Cleanup — يحذف الملفات المؤقتة ويُوفّر مساحة. ابحث عنه في شريط البحث'},{t:'orange',x:'📋 Task Manager — Ctrl+Shift+Esc. أغلق البرامج التي تستهلك أكثر بالضغط عليها ثم End Task'},{t:'green',x:'⬆️ الترقية الأفضل — استبدال HDD بـ SSD! يُضاعف سرعة الحاسب بتكلفة منخفضة'},{t:'purple',x:'🛡️ Windows Defender — مدمج ومجاني. يكفي للحماية المنزلية. تأكد أنه مُفعَّل'}],

{emoji:'🛡️',head:'حماية الحاسب — دليل شامل للأمان',
 body:`<p>الحماية الرقمية ضرورة لا خيار. إليك كل ما تحتاج معرفته:</p>`,

{emoji:'🌍',head:'الحاسب في حياتنا — كل مكان',

function renderLessons(){
  let html='<div class="pad">';
  LESSONS.forEach((l,i)=>{
    const done=lessonsCompleted.has(i);
    const sw=l.slides.reduce((s,sl)=>s+(sl.words?sl.words.length:0),0);
    html+=`<div class="lesson-item" style="border-right-color:${l.color}" onclick="openLesson(${i})">
      <div class="li-icon">${l.icon}</div>
      <div style="flex:1">
        <div class="li-title">${l.title}${done?' ✅':''}</div>
        <div class="li-sub" style="color:${l.color}">${done?'مكتملة ✓':'اضغط للبدء'}</div>
        <div class="li-slides">${l.slides.length} شريحة • ${sw} كلمة إنجليزية</div>
      </div>
      <div style="color:var(--gray);font-size:16px">←</div>
    </div>`;
  });
  html+='</div>';
  $('lessons').innerHTML=html;
}
function openLesson(i){lessonIdx=i;slideIdx=0;renderSlide();}
function renderSlide(){
  const l=LESSONS[lessonIdx],s=l.slides[slideIdx],n=l.slides.length,isLast=slideIdx===n-1;
  let html=`<div class="slide-wrap">`;
  html+=`<div class="dots">${l.slides.map((_,i)=>`<div class="dot${i===slideIdx?' active':''}"></div>`).join('')}</div>`;
  html+=`<div style="text-align:left;font-size:10px;color:var(--gray);margin-bottom:8px">${slideIdx+1}/${n}</div>`;
  html+=`<div class="card pop">`;
  html+=`<span class="slide-emoji">${s.emoji}</span>`;
  html+=`<div class="slide-head">${s.head}</div>`;
  if(s.body)html+=`<div class="slide-body">${s.body}</div>`;
  if(s.info)s.info.forEach(b=>{html+=`<div class="info-box ${b.t}">${b.x}</div>`;});
  if(s.steps){html+=`<div class="step-list">`;s.steps.forEach(st=>{html+=`<div class="step-row"><div class="step-num">${st.n}</div><div class="step-text">${st.text}</div></div>`;});html+=`</div>`;}
  if(s.example)html+=`<div class="example-box"><strong>مثال: </strong>${s.example}</div>`;
  html+=`<div class="fact-box">💡 ${s.fact}</div>`;
  if(s.words&&s.words.length){
    html+=`<div style="font-size:11px;color:var(--gray);margin-bottom:6px;font-weight:700">📚 مفردات إنجليزية:</div>`;
    html+=`<div class="word-grid">`;
    s.words.forEach(w=>{html+=`<div class="word-card"><div class="word-en">${w.en}</div><div class="word-ar">${w.ar}</div></div>`;});
    html+=`</div>`;
  }
  html+=`<div class="nav-row">`;
  if(slideIdx>0)html+=`<button class="btn gray sm" onclick="prevSlide()">→ السابق</button>`;
  else html+=`<button class="btn gray sm" onclick="renderLessons();showScreen('lessons','📚 الدروس')">← الوحدات</button>`;
  if(isLast)html+=`<button class="btn green sm" onclick="finishLesson()">✅ أكملت!</button>`;
  else html+=`<button class="btn sm" style="background:${l.color}" onclick="nextSlide()">التالي ←</button>`;
  html+=`</div></div></div>`;
  $('slide').innerHTML=html;
  showScreen('slide',`${l.icon} ${l.title}`);
}
function nextSlide(){vib(30);slideIdx++;renderSlide();}
function prevSlide(){vib(30);slideIdx--;renderSlide();}

// ══════ QUIZ ══════
function startQuiz(){quizQs=shuffle(QUIZ_QS);quizIdx=0;quizScore=0;renderQuiz();showScreen('quiz','🎯 اختبر نفسك');}
function renderQuiz(){
  if(quizIdx>=quizQs.length){renderQuizResult();return;}
  const q=quizQs[quizIdx],pct=(quizIdx/quizQs.length*100).toFixed(0);
  const labels=['أ','ب','ج','د'],cls=['A','B','C','D'];
  $('quiz').innerHTML=`<div class="pad">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:8px"><span>سؤال ${quizIdx+1}/${quizQs.length}</span><span>✅ ${quizScore}</span></div>
    <div class="quiz-unit">${q.unit}</div>
    <div class="quiz-q-text pop">${q.q}</div>
    <div class="opts">${q.opts.map((o,i)=>`<button class="opt ${cls[i]}" id="opt${i}" onclick="answerQuiz(${i})">${labels[i]} — ${o}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div><div class="feedback-detail" id="fbd"></div>
  </div>`;
}
function answerQuiz(chosen){
  vib(40);const q=quizQs[quizIdx],correct=q.ans,labels=['أ','ب','ج','د'];
  for(let i=0;i<4;i++){const b=$(`opt${i}`);if(!b)continue;b.onclick=null;if(i===correct)b.classList.add('correct');else if(i===chosen&&i!==correct)b.classList.add('wrong');else b.classList.add('dim');}
  const fb=$('fb'),fbd=$('fbd');
  if(chosen===correct){fb.textContent='✅ صح! +١٠ 🌟';fb.className='feedback ok pop';addScore(10);vib([40,20,40]);}
  else{fb.textContent=`❌ الصح: ${labels[correct]} — ${q.opts[correct]}`;fb.className='feedback err shake';vib([100,40,100]);}
  if(fbd&&q.ex)fbd.textContent='💡 '+q.ex;
  quizScore+=(chosen===correct?1:0);
  setTimeout(()=>{quizIdx++;renderQuiz();},1500);
}
function renderQuizResult(){
  quizzesCompleted++;const pct=Math.round(quizScore/quizQs.length*100);
  const star=pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐',msg=pct>=80?'ممتاز! 🏆':pct>=60?'جيد جداً! 😊':'استمر! 💪';
  $('quiz').innerHTML=`<div class="pad"><div class="result pop">
    <div class="big">${star}</div><h2>${msg}</h2>
    <p>${quizScore}/${quizQs.length} إجابة صحيحة<br><strong style="font-size:22px">${pct}%</strong></p>
    <button class="btn pink" onclick="startQuiz()">🔄 مرة أخرى</button>
    <button class="btn gray sm" onclick="renderHome();showScreen('home','🌟 عالم الحاسب')">🏠 الرئيسية</button>
  </div></div>`;
}

  const grid=memCards.map((c,i)=>`<div class="mem-card${c.flipped?' flipped':''}${c.matched?' matched':''}" id="mc${i}" onclick="tapCard(${i})"><span style="${(!c.flipped&&!c.matched)?'visibility:hidden':''}">${c.emoji}</span></div>`).join('');
  $('memory').innerHTML=`<div class="pad">
    <div class="mem-stats"><span>🎯 ${memMoves}</span><span>✅ ${memMatched}/8</span><button class="btn gray xs" style="width:auto;margin:0" onclick="startMemory()">🔄</button></div>
    <div class="mem-grid">${grid}</div>
  </div>`;
}
function tapCard(i){
  if(memWait)return;const c=memCards[i];
  if(c.flipped||c.matched||memFlipped.length>=2)return;
  vib(30);c.flipped=true;memFlipped.push(i);
  const el=$(`mc${i}`);if(el){el.classList.add('flipped');el.querySelector('span').style.visibility='';}
  if(memFlipped.length===2){memMoves++;memWait=true;setTimeout(checkMem,800);}
}
function checkMem(){
  const[a,b]=memFlipped;
  if(memCards[a].emoji===memCards[b].emoji){
    memCards[a].matched=memCards[b].matched=true;memMatched++;addScore(15);vib([30,20,30]);
    [$(`mc${a}`),$(`mc${b}`)].forEach(el=>{if(el)el.classList.add('matched');});
    if(memMatched===8)setTimeout(memWin,400);
  }else{
    memCards[a].flipped=memCards[b].flipped=false;vib(100);
    [$(`mc${a}`),$(`mc${b}`)].forEach(el=>{if(el){el.classList.remove('flipped');el.querySelector('span').style.visibility='hidden';}});
  }
  memFlipped=[];memWait=false;
  const ms=$('memory').querySelector('.mem-stats');
  if(ms)ms.innerHTML=`<span>🎯 ${memMoves}</span><span>✅ ${memMatched}/8</span><button class="btn gray xs" style="width:auto;margin:0" onclick="startMemory()">🔄</button>`;
}
function memWin(){
  addScore(30);
  $('memory').innerHTML=`<div class="pad"><div class="result pop">
    <div class="big">🏆</div><h2>أحسنت!</h2>
    <p>أكملت في <strong>${memMoves}</strong> محاولة!<br>+٣٠ نقطة 🌟</p>
    <button class="btn purple" onclick="startMemory()">🔄 مجدداً</button>
    <button class="btn gray sm" onclick="renderGames();showScreen('games','🎮 العب وتعلم')">← الألعاب</button>
  </div></div>`;
}

// ══════ FAST QUIZ ══════
function startFQ(){fqQs=shuffle(FQ_QS);fqIdx=0;fqScore=0;renderFQ();showScreen('fastquiz','⚡ الأسئلة السريعة');}
function renderFQ(){
  clearInterval(fqTimer);if(fqIdx>=fqQs.length){renderFQResult();return;}
  fqTime=10;const q=fqQs[fqIdx];const colors=['#1565C0','#00695C','#E65100','#4A148C'];const labels=['أ','ب','ج','د'];
  $('fastquiz').innerHTML=`<div class="pad">
    <div class="timer-bar"><div class="timer-fill" id="tfill" style="width:100%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:8px">
      <span id="tcnt">⏱ 10s</span><span>🏅 ${fqScore}</span><span>${fqIdx+1}/${fqQs.length}</span>
    </div>
    <div class="fq-q pop">${q.q}</div>
    <div class="fq-opts">${q.opts.map((o,i)=>`<button class="fq-opt" id="fopt${i}" style="background:${colors[i]}" onclick="answerFQ(${i})">${labels[i]} — ${o}</button>`).join('')}</div>
  </div>`;
  fqTimer=setInterval(()=>{
    fqTime=Math.max(0,fqTime-.1);const pct=fqTime/10*100;
    const f=$('tfill'),c=$('tcnt');
    if(f){f.style.width=pct+'%';f.className='timer-fill'+(pct<25?' danger':pct<55?' warn':'');}
    if(c)c.textContent=`⏱ ${Math.ceil(fqTime)}s`;
    if(fqTime<=0){clearInterval(fqTimer);timeUpFQ();}
  },100);
}
function answerFQ(chosen){
  clearInterval(fqTimer);vib(40);const q=fqQs[fqIdx],correct=q.ans;
  for(let i=0;i<4;i++){const b=$(`fopt${i}`);if(!b)continue;b.onclick=null;if(i===correct)b.classList.add('correct');else if(i===chosen&&i!==correct)b.classList.add('wrong');else b.classList.add('dim');}
  if(chosen===correct){const bonus=Math.max(1,Math.ceil(fqTime));fqScore+=bonus;addScore(bonus*2);vib([30,20,30]);}
  else vib([100,50,100]);
  setTimeout(()=>{fqIdx++;renderFQ();},1200);
}
function timeUpFQ(){
  const c=fqQs[fqIdx].ans;
  for(let i=0;i<4;i++){const b=$(`fopt${i}`);if(!b)continue;b.onclick=null;if(i===c)b.classList.add('correct');else b.classList.add('dim');}
  setTimeout(()=>{fqIdx++;renderFQ();},1200);
}
function renderFQResult(){
  $('fastquiz').innerHTML=`<div class="pad"><div class="result pop">
    <div class="big">🏁</div><h2>انتهى!</h2>
    <p>نقاطك: <strong style="font-size:22px">${fqScore}</strong> 🏅</p>
    <button class="btn teal" onclick="startFQ()">🔄 مجدداً</button>
    <button class="btn gray sm" onclick="renderGames();showScreen('games','🎮 العب وتعلم')">← الألعاب</button>
  </div></div>`;
}

// ══════ WORD SCRAMBLE GAME ══════
function startScramble(){
  scrQs=shuffle(SCRAMBLE_QS);scrIdx=0;scrScore=0;renderScramble();showScreen('scramble','🔤 رتّب الحروف');
}
function renderScramble(){
  if(scrIdx>=scrQs.length){renderScrambleResult();return;}
  const q=scrQs[scrIdx];
  const shuffled=shuffle(q.word.split(''));
  scrLetters=shuffled;scrLetterUsed=new Array(shuffled.length).fill(false);
  scrAnswer=new Array(q.word.length).fill('');
  let html=`<div class="pad">
    <div class="progress-bar"><div class="progress-fill" style="width:${(scrIdx/scrQs.length*100).toFixed(0)}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:10px">
      <span>سؤال ${scrIdx+1}/${scrQs.length}</span><span>🏅 ${scrScore}</span>
    </div>
    <div style="text-align:center;margin-bottom:8px;font-size:16px;color:var(--purpleL);font-weight:700">${q.hint}</div>
    <div class="scramble-hint" style="font-size:13px;color:var(--gray)">رتّب الحروف لتكوّن كلمة إنجليزية تعني: <strong style="color:var(--yellowL)">${q.meaning}</strong></div>
    <div class="answer-slots" id="ans-slots">
      ${q.word.split('').map((_,i)=>`<div class="slot" id="slot${i}" onclick="removeFromSlot(${i})"></div>`).join('')}
    </div>
    <div class="letter-bank" id="letter-bank">
      ${shuffled.map((l,i)=>`<button class="letter-btn" id="lbtn${i}" onclick="addLetter(${i},'${l}')">${l}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn gray sm" style="flex:1" onclick="clearScramble()">🔄 امسح</button>
      <button class="btn green sm" style="flex:1" onclick="checkScramble()">✅ تحقق</button>
    </div>
    <div class="feedback" id="scr-fb" style="margin-top:10px"></div>
  </div>`;
  $('scramble').innerHTML=html;
}
function addLetter(idx,letter){
  const nextSlot=scrAnswer.indexOf('');
  if(nextSlot===-1||scrLetterUsed[idx])return;
  scrLetterUsed[idx]=true;scrAnswer[nextSlot]=letter;
  vib(30);
  const btn=$(`lbtn${idx}`);if(btn)btn.classList.add('used');
  const slot=$(`slot${nextSlot}`);
  if(slot){slot.textContent=letter;slot.classList.add('filled');slot.dataset.lbtn=idx;}
}
function removeFromSlot(slotIdx){
  if(!scrAnswer[slotIdx])return;
  const lbtnIdx=parseInt($(`slot${slotIdx}`)?.dataset.lbtn||'-1');
  scrAnswer[slotIdx]='';
  const slot=$(`slot${slotIdx}`);if(slot){slot.textContent='';slot.classList.remove('filled');slot.dataset.lbtn='';}
  if(lbtnIdx>=0){scrLetterUsed[lbtnIdx]=false;const btn=$(`lbtn${lbtnIdx}`);if(btn)btn.classList.remove('used');}
  vib(20);
}
function clearScramble(){
  scrAnswer=new Array(scrQs[scrIdx].word.length).fill('');
  scrLetterUsed=new Array(scrLetters.length).fill(false);
  for(let i=0;i<scrQs[scrIdx].word.length;i++){const s=$(`slot${i}`);if(s){s.textContent='';s.classList.remove('filled');s.dataset.lbtn='';}}
  for(let i=0;i<scrLetters.length;i++){const b=$(`lbtn${i}`);if(b)b.classList.remove('used');}
}
function checkScramble(){
  const q=scrQs[scrIdx];
  if(scrAnswer.includes(''))return;
  const guess=scrAnswer.join('');
  const fb=$('scr-fb');
  if(guess===q.word){
    fb.textContent=`✅ صح! ${q.word} = ${q.meaning} 🌟`;fb.className='feedback ok pop';
    scrScore++;addScore(20);vib([40,20,40]);
    setTimeout(()=>{scrIdx++;renderScramble();},1500);
  } else {
    fb.textContent=`❌ خطأ! جرّب مرة أخرى`;fb.className='feedback err shake';vib(100);
    setTimeout(()=>{fb.textContent='';fb.className='feedback';},1500);
  }
}
function renderScrambleResult(){
  addScore(scrScore>=8?30:scrScore>=5?15:0);
  $('scramble').innerHTML=`<div class="pad"><div class="result pop">
    <div class="big">🔤</div><h2>${scrScore>=8?'ممتاز! 🏆':scrScore>=5?'جيد! 😊':'استمر! 💪'}</h2>
    <p>كلمات صحيحة: <strong style="font-size:22px">${scrScore}</strong> من ${scrQs.length}</p>
    <button class="btn orange" onclick="startScramble()">🔄 مجدداً</button>
    <button class="btn gray sm" onclick="renderGames();showScreen('games','🎮 العب وتعلم')">← الألعاب</button>
  </div></div>`;
}

// ══════ TRUE/FALSE GAME ══════
function startTF(){
  tfQs=shuffle(TF_QS);tfIdx=0;tfScore=0;renderTF();showScreen('truefalse','✅❌ صح أم خطأ');
}
function renderTF(){
  if(tfIdx>=tfQs.length){renderTFResult();return;}
  const q=tfQs[tfIdx];tfAnswered=false;
  $('truefalse').innerHTML=`<div class="pad">
    <div class="progress-bar"><div class="progress-fill" style="width:${(tfIdx/tfQs.length*100).toFixed(0)}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:10px">
      <span>عبارة ${tfIdx+1}/${tfQs.length}</span><span>✅ ${tfScore} صح</span>
    </div>
    <div class="tf-question pop">${q.q}</div>
    <div class="tf-buttons">
      <button class="tf-btn tf-true" id="tf-true-btn" onclick="answerTF(true)">✅<br>صح</button>
      <button class="tf-btn tf-false" id="tf-false-btn" onclick="answerTF(false)">❌<br>خطأ</button>
    </div>
    <div class="feedback" id="tf-fb"></div>
    <div class="feedback-detail" id="tf-ex"></div>
  </div>`;
}
function answerTF(chosen){
  if(tfAnswered)return;tfAnswered=true;
  const q=tfQs[tfIdx];
  const correct=q.ans;
  const trueBtn=$('tf-true-btn'),falseBtn=$('tf-false-btn');
  trueBtn.onclick=null;falseBtn.onclick=null;
  if(correct){trueBtn.classList.add('correct');falseBtn.classList.add('wrong');}
  else{falseBtn.classList.add('correct');trueBtn.classList.add('wrong');}
  const fb=$('tf-fb'),ex=$('tf-ex');
  if(chosen===correct){
    fb.textContent='✅ صح! +١٢ 🌟';fb.className='feedback ok pop';
    tfScore++;addScore(12);vib([40,20,40]);
  } else {
    fb.textContent='❌ خطأ!';fb.className='feedback err shake';vib([100,40,100]);
  }
  if(ex&&q.ex)ex.textContent='💡 '+q.ex;
  setTimeout(()=>{tfIdx++;renderTF();},1800);
}
function renderTFResult(){
  const pct=Math.round(tfScore/tfQs.length*100);
  addScore(pct>=80?30:pct>=60?15:0);
  $('truefalse').innerHTML=`<div class="pad"><div class="result pop">
    <div class="big">${pct>=80?'🏆':pct>=60?'⭐':'💪'}</div>
    <h2>${pct>=80?'ممتاز!':pct>=60?'جيد جداً!':'استمر!'}</h2>
    <p>${tfScore}/${tfQs.length} إجابة صحيحة<br><strong style="font-size:22px">${pct}%</strong></p>
    <button class="btn blue" onclick="startTF()">🔄 مجدداً</button>
    <button class="btn gray sm" onclick="renderGames();showScreen('games','🎮 العب وتعلم')">← الألعاب</button>
  </div></div>`;
}

// ══════ STARS ══════
function renderStars(){
  const BADGES=[
    {req:15,icon:'🌱',name:'مبتدئ',bg:'#1B5E20'},{req:50,icon:'📚',name:'متعلم',bg:'#0D47A1'},
    {req:100,icon:'🏅',name:'متميز',bg:'#E65100'},{req:200,icon:'🏆',name:'بطل',bg:'#F57F17'},
    {req:400,icon:'🌟',name:'نجم التقنية',bg:'#4A148C'},{req:800,icon:'👑',name:'خبير',bg:'#880E4F'},
  ];
  const earned=BADGES.filter(b=>score>=b.req).length;
  const stars='⭐'.repeat(Math.min(10,Math.floor(score/40)))||'ابدأ التعلم!';
  const totalSlides=LESSONS.reduce((s,l)=>s+l.slides.length,0);
  $('stars').innerHTML=`<div class="pad">
    <div class="big-score pop">
      <div class="snum">${score}</div>
      <div style="color:var(--gray);font-size:11px">نقطة • ${earned} شارة • ${lessonsCompleted.size}/${LESSONS.length} وحدة</div>
    </div>
    <div style="font-size:18px;text-align:center;padding:6px 0;margin-bottom:12px">${stars}</div>
    <div style="font-size:12px;font-weight:700;color:var(--yellowL);margin-bottom:8px">🏅 الشارات</div>
    <div class="badges-grid">${BADGES.map(b=>`<div class="badge-card${score>=b.req?' earned':''}" style="background:${b.bg}"><div class="bi">${b.icon}</div><div class="bn">${b.name}</div><div class="br">${b.req} نقطة</div></div>`).join('')}</div>
    <div class="card">
      <h3>📊 تقدّمك</h3>
      <p>✅ وحدات: ${lessonsCompleted.size}/${LESSONS.length}<br>
         📚 إجمالي الشرائح: ${totalSlides}<br>
         🎯 اختبارات: ${quizzesCompleted}<br>
         💰 النقاط: ${score}</p>
    </div>
    <div class="card">
      <h3>💡 كيف تجمع النقاط؟</h3>
      <p>📚 وحدة مكتملة = ١٥<br>
         🎯 إجابة صحيحة = ١٠<br>
         🃏 زوج الذاكرة = ١٥<br>
         🏆 إكمال الذاكرة = +٣٠<br>
         ⚡ السريعة = نقاط × الوقت<br>
         🔤 رتّب الحروف = ٢٠ كل كلمة<br>
         ✅❌ صح/خطأ = ١٢ كل سؤال</p>
    </div>
  </div>`;
}

// ══════ INIT ══════
renderHome();
</script>
